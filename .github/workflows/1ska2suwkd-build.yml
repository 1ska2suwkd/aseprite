name: Build Aseprite

on:
  workflow_dispatch: # 수동으로 빌드를 실행할 수 있게 해주는 트리거

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Aseprite 구동에 필요한 하위 모듈까지 모두 가져옵니다.

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download Skia
        run: |
          Invoke-WebRequest -Uri https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip -OutFile skia.zip
          Expand-Archive skia.zip -DestinationPath skia

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLAF_BACKEND=skia -DSKIA_DIR=./skia -DSKIA_LIBRARY_DIR=./skia/out/Release-x64 -DSKIA_LIBRARY=./skia/out/Release-x64/skia.lib

      - name: Build Aseprite
        run: ninja -C build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Windows
          path: |
            build/bin/aseprite.exe
            build/bin/data/
